<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Search - Sign Language Videos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; margin-bottom: 20px; color: #333; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
    input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; font-family: monospace; outline: none; transition: border-color 0.3s; }
    input[type="text"]:focus, textarea:focus { border-color: #007bff; }
    textarea { height: 150px; resize: vertical; }
    button { padding: 14px 24px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .download-zip { margin-top: 20px; display: none; }
    .download-zip.visible { display: block; }
    .results { margin-top: 20px; }
    .result-item { padding: 15px; background: #f8f9fa; border-radius: 6px; margin-bottom: 12px; }
    .result-item.found { background: #d4edda; }
    .result-item.not-found { background: #f8d7da; }
    .result-title { font-weight: 600; margin-bottom: 8px; }
    .result-song { color: #155724; margin-bottom: 4px; }
    .result-video { word-break: break-all; }
    .result-video a { color: #007bff; }
    .result-meta { font-size: 12px; color: #666; margin-top: 8px; }
    .loading { display: flex; align-items: center; gap: 10px; }
    .spinner { width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sign Language Video Search</h1>
    
    <div class="input-group">
      <label for="songs">Songs to search (one per line):</label>
      <textarea id="songs" placeholder="Ever Faithful, Ever True - The Wilds
Harvest Time - Hutson Sisters
I Believe God - Alvin Martinez & Brooke Martinez"></textarea>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <button id="searchBtn" onclick="searchVideos()">Search Videos</button>
      <button id="downloadBtn" class="download-zip" onclick="downloadVideos()">Download Found Videos</button>
    </div>

    <div id="results" class="results"></div>
  </div>

  <script>
    let lastResults = [];

    async function searchVideos() {
      const songsText = document.getElementById('songs').value.trim();
      const resultsDiv = document.getElementById('results');
      const searchBtn = document.getElementById('searchBtn');

      if (!songsText) {
        alert('Please enter songs to search');
        return;
      }

      const songs = songsText.split('\n').filter(s => s.trim());
      if (songs.length === 0) {
        alert('Please enter at least one song');
        return;
      }

      resultsDiv.innerHTML = '';
      searchBtn.disabled = true;
      resultsDiv.innerHTML = '<div class="loading"><div class="spinner"></div><span>Searching...</span></div>';

      try {
        const res = await fetch('/search-videos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ songs })
        });
        const data = await res.json();

        resultsDiv.innerHTML = '';
        lastResults = data.results || [];

        if (lastResults) {
          for (const result of lastResults) {
            const itemDiv = document.createElement('div');
            if (result.found) {
              itemDiv.className = 'result-item found';
              itemDiv.innerHTML = `
                <div class="result-title">${result.searchTitle}</div>
                <div class="result-song"><strong>Found:</strong> ${result.song}</div>
                <div class="result-video"><a href="${result.video}" target="_blank">${result.video}</a></div>
                <div class="result-meta">
                  Category: ${result.category || 'N/A'} | 
                  Type: ${result.doctype || 'N/A'} |
                  Submitted: ${result.submitted ? new Date(result.submitted).toLocaleDateString() : 'N/A'}
                </div>
              `;
            } else {
              itemDiv.className = 'result-item not-found';
              itemDiv.innerHTML = `
                <div class="result-title">${result.searchTitle}</div>
                <div>Not found</div>
              `;
            }
            resultsDiv.appendChild(itemDiv);
          }

          const foundVideos = lastResults.filter(r => r.found);
          if (foundVideos.length > 0) {
            document.getElementById('downloadBtn').classList.add('visible');
          }
        }
      } catch (e) {
        resultsDiv.innerHTML = `<div class="result-item failed">Error: ${e.message}</div>`;
      }

      searchBtn.disabled = false;
    }

    async function downloadVideos() {
      const foundVideos = lastResults.filter(r => r.found);
      if (foundVideos.length === 0) return;

      const downloadBtn = document.getElementById('downloadBtn');
      downloadBtn.disabled = true;
      downloadBtn.textContent = 'Downloading...';

      try {
        const res = await fetch('/download-videos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ videos: foundVideos })
        });
        const data = await res.json();
        alert('Download complete!');
      } catch (e) {
        alert('Error: ' + e.message);
      }

      downloadBtn.disabled = false;
      downloadBtn.textContent = 'Download Found Videos';
    }
  </script>
</body>
</html>
