<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download MP3 + Video</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; margin-bottom: 20px; color: #333; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
    input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; font-family: monospace; outline: none; transition: border-color 0.3s; }
    input[type="text"]:focus, textarea:focus { border-color: #007bff; }
    textarea { height: 200px; resize: vertical; }
    button { padding: 14px 24px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .buttons { display: flex; gap: 10px; margin-bottom: 20px; }
    .download-zip { background: #28a745; display: none; }
    .progress { margin-top: 20px; }
    .progress-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: #f8f9fa; border-radius: 6px; margin-bottom: 8px; }
    .progress-item.completed { background: #d4edda; }
    .progress-item.failed { background: #f8d7da; }
    .progress-item.downloading { background: #fff3cd; }
    .spinner { width: 20px; height: 20px; border: 3px solid #ddd; border-top-color: #007bff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-text { flex: 1; font-size: 14px; }
    .filenames { font-size: 12px; color: #666; margin-top: 4px; }
    .error-text { color: #dc3545; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Download MP3 + Video</h1>
    
    <div class="input-group">
      <label for="songs">Songs (one per line, format: TITLE - ARTIST):</label>
      <textarea id="songs" placeholder="Each One, Reach One - Songs of Praise
Ever Faithful, Ever True - The Wilds
Harvest Time - Hutson Sisters
I Believe God - Alvin Martinez & Brooke Martinez"></textarea>
    </div>

    <div class="buttons">
      <button id="downloadBtn" onclick="startDownload()">Download All</button>
      <button id="zipBtn" class="download-zip" onclick="downloadZip()">Download as ZIP</button>
    </div>

    <div id="progress" class="progress"></div>
  </div>

  <script>
    async function startDownload() {
      const songsText = document.getElementById('songs').value.trim();
      const progressDiv = document.getElementById('progress');
      const downloadBtn = document.getElementById('downloadBtn');

      if (!songsText) {
        alert('Please enter songs');
        return;
      }

      const songs = songsText.split('\n').filter(s => s.trim());
      if (songs.length === 0) {
        alert('Please enter at least one song');
        return;
      }

      progressDiv.innerHTML = '';
      downloadBtn.disabled = true;

      for (let i = 0; i < songs.length; i++) {
        const song = songs[i].trim();
        const itemDiv = document.createElement('div');
        itemDiv.className = 'progress-item downloading';
        itemDiv.id = `item-${i}`;
        itemDiv.innerHTML = `
          <div class="spinner"></div>
          <div class="status-text">${song}<br><span class="filenames">Downloading MP3 and Video...</span></div>
        `;
        progressDiv.appendChild(itemDiv);

        try {
          const res = await fetch('/download-all', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ songs: [song] })
          });
          const data = await res.json();
          const result = data.results?.[0];

          if (result?.mp3Success && result?.videoSuccess) {
            itemDiv.className = 'progress-item completed';
            itemDiv.querySelector('.spinner').style.display = 'none';
            itemDiv.innerHTML = `
              <div>&#10003;</div>
              <div class="status-text">${song}<br>
                <span class="filenames">MP3: ${result.mp3Filename}<br>Video: ${result.videoFilename}</span>
              </div>
            `;
          } else {
            itemDiv.className = 'progress-item failed';
            itemDiv.querySelector('.spinner').style.display = 'none';
            itemDiv.innerHTML = `
              <div>&#10007;</div>
              <div class="status-text">${song}<br>
                <span class="error-text">${result?.error || 'Download failed'}</span>
              </div>
            `;
          }
        } catch (e) {
          itemDiv.className = 'progress-item failed';
          itemDiv.querySelector('.spinner').style.display = 'none';
          itemDiv.innerHTML = `
            <div>&#10007;</div>
            <div class="status-text">${song}<br>
              <span class="error-text">${e.message}</span>
            </div>
          `;
        }

        await new Promise(r => setTimeout(r, 500));
      }

      downloadBtn.disabled = false;
      document.getElementById('zipBtn').style.display = 'block';
    }

    function downloadZip() {
      window.location.href = '/download-zip';
    }
  </script>
</body>
</html>
